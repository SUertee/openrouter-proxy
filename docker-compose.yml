services:
  tokyo-openrouter-proxy:
    build: .
    container_name: tokyo-openrouter-proxy
    env_file:
      - .env
    ports:
      - "8787:8787"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://127.0.0.1:8787/health', timeout=3).raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
